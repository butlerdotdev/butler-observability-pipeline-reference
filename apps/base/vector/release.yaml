apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: vector
spec:
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  releaseName: vector
  interval: 1h0m0s
  timeout: 10m0s
  chart:
    spec:
      chart: vector
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: vector-repo
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
